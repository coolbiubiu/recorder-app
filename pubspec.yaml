name: recoder_app
description: "Flutter跨平台音频录制APP - 支持麦克风、系统声音、混合录制模式"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  provider: ^6.1.2

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 音频录制
  record: ^5.2.1
  audio_session: ^0.1.21

  # 音频播放
  audioplayers: ^6.0.0

  # 权限管理
  permission_handler: ^11.3.0

  # 文件与路径
  path_provider: ^2.1.2
  path: ^1.9.0

  # 工具类
  uuid: ^4.3.3
  intl: ^0.19.0

  # 分享功能
  share_plus: ^7.2.1

  # 文件选择
  file_picker: ^8.0.0

  # UI组件
  flutter_slidable: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true